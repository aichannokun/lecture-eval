<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>강의평가 프로그램</title>
    <meta name="google-client-id" content="265288888730-59oq6cl7c0ngc8kej54c2h33j8i1pv8j.apps.googleusercontent.com">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Malgun Gothic', -apple-system, sans-serif; padding: 10px; background: #f2f2f7; margin: 0; font-size: 14px; }
        h1 { color: #1a1a1a; font-size: 18px; text-align: center; margin: 0 0 12px; font-weight: 700; }

        /* ── 버튼 공통 ── */
        button, label.btn-file {
            display: inline-block; padding: 8px 14px; border: 1px solid #d1d1d1;
            border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
            background: #fff; color: #1a1a1a; transition: background 0.12s;
            white-space: nowrap; margin: 2px; font-family: inherit; text-align: center;
        }
        button:hover, label.btn-file:hover { background: #f0f0f0; }
        button.primary { background: #1c1c1e; color: #fff; border-color: #1c1c1e; }
        button.primary:hover { background: #3a3a3c; }
        button.danger  { color: #c0392b; border-color: #c0392b; background: #fff; }
        button.danger:hover  { background: #fff0ef; }
        button.muted   { background: #f2f2f7; color: #555; border-color: #d1d1d1; }
        button.muted:hover   { background: #e8e8ed; }
        button.sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
        button:disabled { opacity: 0.35; cursor: default; }

        /* ── 상단 바 ── */
        .top-bar {
            background: #fff; border: 1px solid #e0e0e0; border-radius: 10px;
            padding: 10px 12px; margin-bottom: 10px;
            display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
        }
        .drive-status { font-size: 12px; color: #888; flex: 1 1 100%; }
        .drive-status.ok  { color: #1a7a3c; font-weight: 600; }
        .drive-status.err { color: #c0392b; font-weight: 600; }
        .top-btns { display: flex; flex-wrap: wrap; gap: 4px; }

        /* ── 평가 알림 패널 ── */
        .alert-panel {
            background: #fff; border: 1px solid #e0e0e0; border-radius: 10px;
            padding: 12px 14px; margin-bottom: 10px;
        }
        .alert-panel-title { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
        .alert-empty { font-size: 13px; color: #aaa; }
        .alert-chips { display: flex; flex-wrap: wrap; gap: 6px; }
        .alert-chip {
            font-size: 12px; padding: 4px 10px; border-radius: 16px;
            background: #fff3cd; border: 1px solid #ffc107; color: #7c5500; font-weight: 600;
        }
        .alert-chip.urgent { background: #fde8e8; border-color: #e74c3c; color: #922b21; }

        /* ── 섹션 ── */
        .section-container { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
        .section-title-input { font-size: 17px; font-weight: 700; border: none; background: transparent; padding: 4px; color: #1a1a1a; width: 140px; font-family: inherit; }
        .section-title-input:focus { outline: 2px solid #1c1c1e; border-radius: 4px; background: #fff; }
        .section-btns { display: flex; flex-wrap: wrap; gap: 4px; }

        /* ── 수강생 카드 (모바일 중심) ── */
        .student-list { display: flex; flex-direction: column; gap: 8px; }
        .student-card {
            border: 1px solid #e0e0e0; border-radius: 10px; padding: 10px 12px;
            background: #fafafa; transition: border-color 0.15s;
        }
        .student-card.done-card { background: #f0fff4; border-color: #a8d5b5; }

        /* 카드 상단: 이름 + 평가 버튼 */
        .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .card-name-input {
            flex: 1; min-width: 80px; border: none; background: transparent;
            font-size: 15px; font-weight: 700; font-family: inherit; color: #1a1a1a; padding: 2px 4px;
        }
        .card-name-input:focus { outline: 2px solid #1c1c1e; border-radius: 4px; background: #fff; }
        .card-done-info { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .done-badge { font-size: 12px; color: #1a7a3c; font-weight: 700; display: flex; align-items: center; gap: 3px; }
        .done-badge::before { content: "✓"; font-size: 13px; }
        .done-elapsed { font-size: 11px; color: #888; }

        /* 별점 그리드 — 내용 너비에 맞게 자동 */
        .score-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
        .score-item { display: flex; flex-direction: column; width: auto; }
        .score-label { font-size: 11px; color: #888; margin-bottom: 2px; font-weight: 600; white-space: nowrap; }
        .score-select {
            border: 1px solid #d1d1d1; border-radius: 6px; padding: 5px 4px;
            font-size: 13px; background: #fff; color: #1a1a1a; font-family: inherit; cursor: pointer;
            width: auto;
        }
        .score-select:focus { outline: 2px solid #1c1c1e; }

        /* 카드 하단 버튼줄 */
        .card-actions { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }

        /* ── 중단 보관함 ── */
        .stopped-details { margin-top: 10px; }
        .stopped-summary {
            font-size: 13px; font-weight: 600; color: #888; cursor: pointer;
            outline: none; user-select: none; padding: 6px 0;
        }
        details[open] .stopped-summary { color: #1a1a1a; margin-bottom: 8px; }

        /* 중단 카드: 더 작고 흐리게 */
        .stopped-list .student-card { padding: 6px 10px; border-radius: 8px; background: #f5f5f5; border-color: #e8e8e8; }
        .stopped-list .card-name-input { font-size: 13px; }
        .stopped-list .score-label { font-size: 10px; }
        .stopped-list .score-select { font-size: 12px; padding: 3px 3px; }
        .stopped-list .card-top { margin-bottom: 4px; }
        .stopped-list .score-grid { gap: 4px; margin-bottom: 4px; }
        .stopped-list button.sm { font-size: 11px; padding: 3px 8px; }

        /* ── 모달 ── */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; justify-content: center; align-items: flex-end; }
        @media (min-width: 600px) { .modal-overlay { align-items: center; } }
        .modal-content {
            background: #fff; padding: 20px; border-radius: 16px 16px 0 0; width: 100%;
            max-width: 560px; max-height: 92vh; overflow-y: auto;
            box-shadow: 0 -4px 30px rgba(0,0,0,0.15);
        }
        @media (min-width: 600px) { .modal-content { border-radius: 14px; } }
        .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: #1a1a1a; }
        .modal-textarea {
            width: 100%; padding: 10px; border: 1px solid #d1d1d1; border-radius: 8px;
            font-size: 14px; margin-bottom: 10px; font-family: inherit; height: 120px; resize: vertical;
        }
        .modal-select-input { width: 100%; padding: 9px 10px; border: 1px solid #d1d1d1; border-radius: 8px; font-size: 14px; margin-bottom: 10px; font-family: inherit; color: #1a1a1a; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }

        /* ── 빠른 입력 ── */
        .quick-section { margin-bottom: 12px; }
        .quick-label { font-size: 12px; color: #888; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .quick-chips { display: flex; flex-wrap: wrap; gap: 6px; }
        .chip-wrap { display: inline-flex; align-items: center; gap: 3px; }
        .chip-text { font-size: 13px; padding: 6px 12px; background: #f2f2f7; border: 1px solid #d1d1d1; border-radius: 18px; cursor: pointer; color: #1a1a1a; }
        .chip-text:hover { background: #e8e8ed; }
        .chip-edit-input { font-size: 12px; padding: 4px 9px; border: 1px solid #1c1c1e; border-radius: 16px; width: 110px; font-family: inherit; }
        .chip-del { font-size: 11px; padding: 3px 7px; background: #fff; color: #c0392b; border: 1px solid #e0b0b0; border-radius: 10px; cursor: pointer; }
        .quick-add-row { display: flex; gap: 6px; margin-top: 8px; }
        .quick-add-input { flex: 1; padding: 7px 10px; border: 1px solid #d1d1d1; border-radius: 8px; font-size: 13px; font-family: inherit; }

        /* ── 컬럼 순서 ── */
        .col-order-list { list-style: none; padding: 0; margin: 0 0 14px 0; }
        .col-order-item { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: #f8f8f8; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 6px; font-size: 14px; }
        .col-order-name { flex: 1; }

        /* ── 출석부 ── */
        .attend-bar { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
        .attend-bar-title { font-size: 15px; font-weight: 700; color: #1a1a1a; }

        /* PC에서 넓은 화면 대응 */
        @media (min-width: 900px) {
            body { padding: 20px; max-width: 960px; margin: 0 auto; }
        }
    </style>
</head>
<body>

<h1>강의평가 프로그램</h1>

<!-- 상단 바 -->
<div class="top-bar">
    <div class="drive-status" id="driveStatus">드라이브 미연결</div>
    <div class="top-btns">
        <button id="btnDriveLogin" onclick="driveLogin()" class="primary sm">구글 로그인</button>
        <button id="btnDriveSave"  onclick="driveSave()"  class="sm" style="display:none">드라이브 저장</button>
        <button id="btnDriveLoad"  onclick="driveLoad()"  class="sm" style="display:none">드라이브 불러오기</button>
        <button id="btnDriveLogout" onclick="driveLogout()" class="muted sm" style="display:none">로그아웃</button>
        <button onclick="exportToFile()" class="muted sm">백업 다운로드</button>
        <label class="btn-file sm">백업 불러오기<input type="file" id="fileInput" accept=".json" style="display:none" onchange="importFromFile(event)"></label>
    </div>
</div>

<!-- 평가 알림 패널 -->
<div class="alert-panel" id="alertPanel">
    <div class="alert-panel-title">평가 필요</div>
    <div id="alertContent" class="alert-empty">평가 기한이 다가오는 수강생이 없습니다.</div>
</div>

<div id="sectionA" class="section-container"></div>
<div id="sectionB" class="section-container"></div>

<!-- 출석부 -->
<div class="attend-bar">
    <span class="attend-bar-title">출석부</span>
    <button class="primary sm" onclick="window.open('https://staff.koreagroupware.com/login.asp','attendPopup','width=1100,height=750,scrollbars=yes,resizable=yes')">출석부 열기</button>
</div>

<textarea id="clipboardArea" style="position:absolute;left:-9999px;"></textarea>

<!-- 상세 내용 모달 -->
<div id="detailModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-title" id="modalTitle">상세 내용 작성</div>
        <div class="quick-section">
            <div class="quick-label">
                <span>빠른 입력</span>
                <button class="muted sm" onclick="toggleQuickEdit()" id="btnQuickEdit">편집</button>
            </div>
            <div class="quick-chips" id="quickChips"></div>
            <div class="quick-add-row" id="quickAddRow" style="display:none">
                <input type="text" class="quick-add-input" id="quickAddInput" placeholder="새 항목 입력...">
                <button onclick="addQuickChip()" class="primary sm">추가</button>
            </div>
        </div>
        <textarea id="modalTextarea" class="modal-textarea" placeholder="상세 내용을 자유롭게 작성하세요..."></textarea>
        <div class="modal-actions">
            <button onclick="closeModal()" class="muted">취소</button>
            <button onclick="saveModalData()" class="primary">저장</button>
        </div>
    </div>
</div>

<!-- 항목 삭제 모달 -->
<div id="deleteColModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-title">평가 항목 삭제</div>
        <p style="font-size:13px;color:#555;margin-bottom:10px;">삭제할 항목을 선택하세요.</p>
        <div id="deleteColSelectContainer"></div>
        <div class="modal-actions" style="margin-top:16px;">
            <button onclick="closeDeleteColModal()" class="muted">취소</button>
            <button onclick="confirmDeleteCol()" class="danger">삭제</button>
        </div>
    </div>
</div>

<!-- 컬럼 순서 편집 모달 -->
<div id="colOrderModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-title">평가 항목 순서 변경</div>
        <p style="font-size:13px;color:#aaa;margin-bottom:12px;">▲ ▼ 버튼으로 순서를 바꾸세요. A·B 강의장 모두 적용됩니다.</p>
        <ul class="col-order-list" id="colOrderList"></ul>
        <div class="modal-actions">
            <button onclick="closeColOrderModal()" class="muted">취소</button>
            <button onclick="saveColOrder()" class="primary">저장</button>
        </div>
    </div>
</div>

<script>
// ────────────────────────────────────────────────
// 상태
// ────────────────────────────────────────────────
let defaultState = {
    A: { title:"A강의장", headers:["기본기 능력","창의적 감각","채색 능력","인내/끈기","성실함","자체적 재능"],
         rows:[{name:"",scores:[0,0,0,0,0,0],detail:"",doneDate:""}], stoppedRows:[] },
    B: { title:"B강의장", headers:["기본기 능력","창의적 감각","채색 능력","인내/끈기","성실함","자체적 재능"],
         rows:[{name:"",scores:[0,0,0,0,0,0],detail:"",doneDate:""}], stoppedRows:[] },
    detailHeader:"상세 내용"
};
let state = JSON.parse(JSON.stringify(defaultState));
let detailsOpenState = { A:false, B:false };   // 기본 접힘
let currentModalTarget = { section:null, idx:null, isStopped:false };
let colOrderBuffer = [];
let quickEditMode = false;

// ────────────────────────────────────────────────
// 날짜 유틸
// ────────────────────────────────────────────────
function getKSTToday() {
    // 한국 시간 기준 오늘 날짜 Date 객체 반환
    let now = new Date();
    let kst = new Date(now.getTime() + 9*60*60*1000);
    return new Date(kst.toISOString().slice(0,10));
}
function getTodayStr() {
    let d = getKSTToday();
    let yy = String(d.getFullYear()).slice(2);
    let mm = String(d.getMonth()+1).padStart(2,'0');
    let dd = String(d.getDate()).padStart(2,'0');
    return `${yy}/${mm}/${dd}`;
}
function parseDoneDate(str) {
    // "yy/mm/dd" → Date
    if (!str) return null;
    let [yy,mm,dd] = str.split('/');
    return new Date(2000+parseInt(yy), parseInt(mm)-1, parseInt(dd));
}
function daysSinceDone(doneDate) {
    if (!doneDate) return null;
    let d = parseDoneDate(doneDate);
    if (!d) return null;
    let today = getKSTToday();
    return Math.floor((today - d) / (1000*60*60*24));
}
function dDayLeft(doneDate) {
    // 30일까지 남은 일수 (30 - 경과일)
    let elapsed = daysSinceDone(doneDate);
    if (elapsed === null) return null;
    return 30 - elapsed;
}

// ────────────────────────────────────────────────
// 평가 알림 패널 렌더
// ────────────────────────────────────────────────
function renderAlertPanel() {
    let chips = [];
    ['A','B'].forEach(sec => {
        let allRows = [...state[sec].rows]; // 중단 수강생 제외
        allRows.forEach(row => {
            if (!row.doneDate) return;
            let left = dDayLeft(row.doneDate);
            if (left === null) return;
            if (left <= 7 && left >= -3) { // D-7 ~ D+3 범위
                let name = row.name.trim() || "이름 미상";
                let label = left >= 0 ? `D-${left}` : `D+${Math.abs(left)}`;
                let urgent = left <= 2;
                chips.push({ name, label, urgent });
            }
        });
    });

    let el = document.getElementById('alertContent');
    if (chips.length === 0) {
        el.className = 'alert-empty';
        el.innerHTML = '평가 기한이 다가오는 수강생이 없습니다.';
    } else {
        el.className = 'alert-chips';
        el.innerHTML = chips.map(c =>
            `<span class="alert-chip${c.urgent?' urgent':''}">${c.name} (${c.label})</span>`
        ).join('');
    }
}

// ────────────────────────────────────────────────
// 빠른 입력 칩
// ────────────────────────────────────────────────
const QUICK_KEY = "academyQuickBtns";
let quickChips = JSON.parse(localStorage.getItem(QUICK_KEY)||"null") || [
    "성실하게 참여","기본기 우수","창의성 돋보임","꾸준한 발전","집중력 필요","추가 연습 권장"
];
function saveQuickChips() { localStorage.setItem(QUICK_KEY, JSON.stringify(quickChips)); }

function renderQuickChips() {
    let area = document.getElementById("quickChips");
    area.innerHTML = "";
    quickChips.forEach((text, i) => {
        let wrap = document.createElement("span");
        wrap.className = "chip-wrap";
        if (quickEditMode) {
            let inp = document.createElement("input");
            inp.type="text"; inp.className="chip-edit-input"; inp.value=text;
            inp.onchange = () => { quickChips[i] = inp.value.trim()||text; saveQuickChips(); };
            let del = document.createElement("button");
            del.className="chip-del"; del.textContent="삭제";
            del.onclick = () => { quickChips.splice(i,1); saveQuickChips(); renderQuickChips(); };
            wrap.appendChild(inp); wrap.appendChild(del);
        } else {
            let chip = document.createElement("span");
            chip.className="chip-text"; chip.textContent=text;
            chip.onclick = () => {
                let ta = document.getElementById("modalTextarea");
                ta.value = (ta.value ? ta.value+"\n" : "") + text;
            };
            wrap.appendChild(chip);
        }
        area.appendChild(wrap);
    });
}
function toggleQuickEdit() {
    quickEditMode = !quickEditMode;
    document.getElementById("btnQuickEdit").textContent = quickEditMode ? "완료" : "편집";
    document.getElementById("quickAddRow").style.display = quickEditMode ? "flex" : "none";
    renderQuickChips();
}
function addQuickChip() {
    let v = document.getElementById("quickAddInput").value.trim();
    if (!v) return;
    quickChips.push(v); saveQuickChips();
    document.getElementById("quickAddInput").value = "";
    renderQuickChips();
}

// ────────────────────────────────────────────────
// 별점
// ────────────────────────────────────────────────
function getStarString(score) {
    if (score==0) return "선택";
    return '★'.repeat(Math.floor(score/2)) + (score%2?'½':'');
}
function getOnlyStars(score) {
    if (score==0) return "평가 안 됨";
    return '★'.repeat(Math.floor(score/2)) + (score%2?'½':'');
}

// ────────────────────────────────────────────────
// 데이터 로드/저장
// ────────────────────────────────────────────────
function syncHeadersOnLoad() {
    let maxCols = Math.max(state.A.headers.length, state.B.headers.length);
    let base = state.A.headers.length >= state.B.headers.length ? state.A.headers : state.B.headers;
    ['A','B'].forEach(sec => {
        while (state[sec].headers.length < maxCols) {
            state[sec].headers.push(base[state[sec].headers.length]||"새 항목");
            state[sec].rows.forEach(r=>r.scores.push(0));
            state[sec].stoppedRows.forEach(r=>r.scores.push(0));
        }
        state[sec].headers = [...base];
        state[sec].rows.forEach(r=>{ if(!r.doneDate) r.doneDate=""; });
        state[sec].stoppedRows.forEach(r=>{ if(!r.doneDate) r.doneDate=""; });
    });
    if (!state.detailHeader) state.detailHeader = "상세 내용";
}
function loadData() {
    let saved = localStorage.getItem('academyEvalPro');
    if (saved) {
        let p = JSON.parse(saved);
        if (!p.A.stoppedRows) p.A.stoppedRows = [];
        if (!p.B.stoppedRows) p.B.stoppedRows = [];
        state = p; syncHeadersOnLoad();
    }
    renderAll();
}
function saveData() { localStorage.setItem('academyEvalPro', JSON.stringify(state)); }

// ────────────────────────────────────────────────
// 행 관리
// ────────────────────────────────────────────────
function addRow(sec) {
    state[sec].rows.push({name:"",scores:new Array(state[sec].headers.length).fill(0),detail:"",doneDate:""});
    saveData(); renderAll();
}
function stopRow(sec, idx) {
    if (confirm("이 수강생을 중단 보관함으로 이동시키겠습니까?")) {
        state[sec].stoppedRows.push(state[sec].rows.splice(idx,1)[0]);
        // 기본 접힘 상태 유지 (detailsOpenState 건드리지 않음)
        saveData(); renderAll();
    }
}
function restoreRow(sec, idx) {
    if (confirm("복구하시겠습니까?")) {
        state[sec].rows.push(state[sec].stoppedRows.splice(idx,1)[0]);
        saveData(); renderAll();
    }
}
function deleteStoppedRow(sec, idx) {
    if (confirm("완전히 삭제하시겠습니까? (복구 불가)")) {
        state[sec].stoppedRows.splice(idx,1); saveData(); renderAll();
    }
}

// ────────────────────────────────────────────────
// 평가완료
// ────────────────────────────────────────────────
function markDone(sec, idx, isStopped) {
    let arr = isStopped ? state[sec].stoppedRows : state[sec].rows;
    if (arr[idx].doneDate) {
        if (!confirm("이미 평가완료 처리되어 있습니다. 오늘 날짜로 다시 설정할까요?")) return;
    }
    arr[idx].doneDate = getTodayStr();
    saveData(); renderAll();
}
function clearDone(sec, idx, isStopped) {
    let arr = isStopped ? state[sec].stoppedRows : state[sec].rows;
    arr[idx].doneDate = "";
    saveData(); renderAll();
}

// ────────────────────────────────────────────────
// 컬럼 관리
// ────────────────────────────────────────────────
function addColumnGlobal() {
    let name = `평가항목${state.A.headers.length+1}`;
    state.A.headers.push(name); state.B.headers.push(name);
    ['A','B'].forEach(sec => {
        state[sec].rows.forEach(r=>r.scores.push(0));
        state[sec].stoppedRows.forEach(r=>r.scores.push(0));
    });
    saveData(); renderAll();
}
function openDeleteColModal() {
    let html = '<select id="colToDelete" class="modal-select-input" style="color:#1a1a1a;">';
    state.A.headers.forEach((h,i) => { html+=`<option value="${i}">${h}</option>`; });
    html += '</select>';
    document.getElementById('deleteColSelectContainer').innerHTML = html;
    document.getElementById('deleteColModal').style.display = 'flex';
}
function closeDeleteColModal() { document.getElementById('deleteColModal').style.display='none'; }
function confirmDeleteCol() {
    let idx = parseInt(document.getElementById('colToDelete').value);
    if (confirm(`[ ${state.A.headers[idx]} ] 항목을 삭제하시겠습니까?`)) {
        state.A.headers.splice(idx,1); state.B.headers.splice(idx,1);
        ['A','B'].forEach(sec=>{
            state[sec].rows.forEach(r=>r.scores.splice(idx,1));
            state[sec].stoppedRows.forEach(r=>r.scores.splice(idx,1));
        });
        saveData(); renderAll(); closeDeleteColModal();
    }
}
function openColOrderModal() {
    colOrderBuffer = [...state.A.headers];
    renderColOrderList();
    document.getElementById('colOrderModal').style.display='flex';
}
function closeColOrderModal() { document.getElementById('colOrderModal').style.display='none'; }
function renderColOrderList() {
    let ul = document.getElementById('colOrderList');
    ul.innerHTML = "";
    colOrderBuffer.forEach((name, i) => {
        let li = document.createElement('li');
        li.className = 'col-order-item';
        li.innerHTML = `<span class="col-order-name">${i+1}. ${name}</span>
            <button class="sm" onclick="moveCol(${i},-1)" ${i===0?'disabled':''}>▲</button>
            <button class="sm" onclick="moveCol(${i},1)"  ${i===colOrderBuffer.length-1?'disabled':''}>▼</button>`;
        ul.appendChild(li);
    });
}
function moveCol(idx, dir) {
    let n = idx+dir;
    if (n<0||n>=colOrderBuffer.length) return;
    [colOrderBuffer[idx],colOrderBuffer[n]]=[colOrderBuffer[n],colOrderBuffer[idx]];
    renderColOrderList();
}
function saveColOrder() {
    let old = [...state.A.headers];
    let order = colOrderBuffer.map(name=>old.indexOf(name));
    ['A','B'].forEach(sec=>{
        state[sec].headers = order.map(i=>old[i]);
        state[sec].rows.forEach(r=>{ r.scores=order.map(i=>r.scores[i]); });
        state[sec].stoppedRows.forEach(r=>{ r.scores=order.map(i=>r.scores[i]); });
    });
    saveData(); renderAll(); closeColOrderModal();
}

// ────────────────────────────────────────────────
// 파일 내보내기/가져오기
// ────────────────────────────────────────────────
function exportToFile() {
    let a = document.createElement('a');
    a.setAttribute("href","data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(state)));
    a.setAttribute("download","수강생평가데이터.json");
    document.body.appendChild(a); a.click(); a.remove();
}
function importFromFile(e) {
    let file = e.target.files[0]; if (!file) return;
    let reader = new FileReader();
    reader.onload = function(ev) {
        try {
            let p = JSON.parse(ev.target.result);
            if (!p.A.stoppedRows) p.A.stoppedRows=[];
            if (!p.B.stoppedRows) p.B.stoppedRows=[];
            state=p; syncHeadersOnLoad(); saveData(); renderAll(); alert("불러오기 완료!");
        } catch { alert("파일 오류"); }
        e.target.value='';
    };
    reader.readAsText(file);
}

// ────────────────────────────────────────────────
// 복사 (평가완료 날짜 제외)
// ────────────────────────────────────────────────
function copyRowData(sec, idx, isStopped) {
    let row = (isStopped?state[sec].stoppedRows:state[sec].rows)[idx];
    let name = row.name.trim()||"이름 미상";
    let text = `이름 : ${name}\n`;
    state[sec].headers.forEach((h,i)=>{ text+=`${h} : ${getOnlyStars(row.scores[i])}\n`; });
    text += `\n+ ${state.detailHeader} :\n${row.detail||"내용 없음"}\n`;
    let ta = document.getElementById('clipboardArea');
    ta.value=text; ta.select(); document.execCommand('copy');
    alert(`[${name}] 복사 완료!`);
}

// ────────────────────────────────────────────────
// 상세 내용 모달
// ────────────────────────────────────────────────
function openModal(sec, idx, isStopped) {
    currentModalTarget={section:sec,idx,isStopped};
    let row=(isStopped?state[sec].stoppedRows:state[sec].rows)[idx];
    document.getElementById('modalTitle').innerText=`[${row.name.trim()||"이름 미상"}] ${state.detailHeader}`;
    document.getElementById('modalTextarea').value=row.detail;
    quickEditMode=false;
    document.getElementById("btnQuickEdit").textContent="편집";
    document.getElementById("quickAddRow").style.display="none";
    renderQuickChips();
    document.getElementById('detailModal').style.display='flex';
}
function closeModal() { document.getElementById('detailModal').style.display='none'; }
function saveModalData() {
    let t=currentModalTarget;
    let arr=t.isStopped?state[t.section].stoppedRows:state[t.section].rows;
    arr[t.idx].detail=document.getElementById('modalTextarea').value;
    saveData(); closeModal(); renderAll();
}
function updateDetailsState(key,open) { detailsOpenState[key]=open; }

// ────────────────────────────────────────────────
// 수강생 카드 렌더
// ────────────────────────────────────────────────
function buildCard(sec, row, idx, isStopped) {
    let isDone = !!row.doneDate;
    let elapsed = daysSinceDone(row.doneDate);

    let card = document.createElement('div');
    card.className = 'student-card' + (isDone?' done-card':'');

    // ── 카드 상단: 이름 + 평가완료 영역
    let top = document.createElement('div');
    top.className = 'card-top';

    let nameInp = document.createElement('input');
    nameInp.type='text'; nameInp.className='card-name-input';
    nameInp.placeholder='이름'; nameInp.value=row.name;
    nameInp.dataset.sec=sec; nameInp.dataset.idx=idx;
    nameInp.dataset.type=isStopped?'stopped':'active'; nameInp.dataset.field='name';
    top.appendChild(nameInp);

    if (isDone) {
        let info = document.createElement('div');
        info.className='card-done-info';
        let badge = document.createElement('span');
        badge.className='done-badge';
        badge.innerHTML=` ${row.doneDate}`;
        let days = document.createElement('span');
        days.className='done-elapsed';
        days.textContent = elapsed !== null ? `- ${elapsed}일 경과` : '';
        let cancelBtn = document.createElement('button');
        cancelBtn.className='sm muted'; cancelBtn.textContent='취소';
        cancelBtn.onclick=()=>clearDone(sec,idx,isStopped);
        info.appendChild(badge); info.appendChild(days); info.appendChild(cancelBtn);
        top.appendChild(info);
    } else {
        let doneBtn = document.createElement('button');
        doneBtn.className='sm primary'; doneBtn.textContent='평가완료';
        doneBtn.onclick=()=>markDone(sec,idx,isStopped);
        top.appendChild(doneBtn);
    }
    card.appendChild(top);

    // ── 별점 그리드
    let grid = document.createElement('div');
    grid.className='score-grid';
    state[sec].headers.forEach((h,sIdx)=>{
        let item = document.createElement('div');
        item.className='score-item';
        let label = document.createElement('span');
        label.className='score-label'; label.textContent=h;
        let sel = document.createElement('select');
        sel.className='score-select';
        sel.dataset.sec=sec; sel.dataset.idx=idx;
        sel.dataset.type=isStopped?'stopped':'active'; sel.dataset.sidx=sIdx;
        sel.innerHTML='<option value="0">선택</option>';
        for(let v=1;v<=10;v++){
            let opt=document.createElement('option');
            opt.value=v; opt.textContent=getStarString(v);
            if(row.scores[sIdx]==v) opt.selected=true;
            sel.appendChild(opt);
        }
        item.appendChild(label); item.appendChild(sel);
        grid.appendChild(item);
    });
    card.appendChild(grid);

    // ── 카드 하단 버튼
    let actions = document.createElement('div');
    actions.className='card-actions';

    let hasDetail = !!row.detail;
    let detailBtn = document.createElement('button');
    detailBtn.className = hasDetail ? 'sm primary' : 'sm muted';
    detailBtn.textContent = hasDetail ? '상세 보기/수정' : '상세 작성';
    detailBtn.onclick=()=>openModal(sec,idx,isStopped);
    actions.appendChild(detailBtn);

    let copyBtn = document.createElement('button');
    copyBtn.className='sm'; copyBtn.textContent='복사';
    copyBtn.onclick=()=>copyRowData(sec,idx,isStopped);
    actions.appendChild(copyBtn);

    if (isStopped) {
        let restoreBtn = document.createElement('button');
        restoreBtn.className='sm'; restoreBtn.textContent='복구';
        restoreBtn.onclick=()=>restoreRow(sec,idx);
        let delBtn = document.createElement('button');
        delBtn.className='sm danger'; delBtn.textContent='삭제';
        delBtn.onclick=()=>deleteStoppedRow(sec,idx);
        actions.appendChild(restoreBtn); actions.appendChild(delBtn);
    } else {
        let stopBtn = document.createElement('button');
        stopBtn.className='sm muted'; stopBtn.textContent='중단';
        stopBtn.onclick=()=>stopRow(sec,idx);
        actions.appendChild(stopBtn);
    }
    card.appendChild(actions);
    return card;
}

// ────────────────────────────────────────────────
// 섹션 렌더
// ────────────────────────────────────────────────
function renderSection(sec, containerId) {
    let s = state[sec];
    let container = document.getElementById(containerId);

    // 헤더
    let headerHtml = `<div class="section-header">
        <input type="text" class="section-title-input" data-sec="${sec}" data-field="title" value="${s.title}">
        <div class="section-btns">
            <button class="sm" onclick="addColumnGlobal()">항목 추가</button>
            <button class="sm" onclick="openColOrderModal()">순서 편집</button>
            <button class="sm danger" onclick="openDeleteColModal()">항목 삭제</button>
            <button class="sm primary" onclick="addRow('${sec}')">수강생 추가</button>
        </div>
    </div>`;
    container.innerHTML = headerHtml;

    // 진행 수강생 카드 리스트
    let list = document.createElement('div');
    list.className='student-list';
    s.rows.forEach((row,idx)=>list.appendChild(buildCard(sec,row,idx,false)));
    container.appendChild(list);

    // 중단 보관함 (기본 접힘)
    if (s.stoppedRows.length > 0) {
        let details = document.createElement('details');
        details.className='stopped-details';
        if (detailsOpenState[sec]) details.open=true;
        details.addEventListener('toggle',()=>updateDetailsState(sec,details.open));

        let summary = document.createElement('summary');
        summary.className='stopped-summary';
        summary.textContent=`중단된 수강생 보관함 (${s.stoppedRows.length}명)`;
        details.appendChild(summary);

        let stoppedList = document.createElement('div');
        stoppedList.className='student-list stopped-list';
        stoppedList.style.marginTop='8px';
        s.stoppedRows.forEach((row,idx)=>stoppedList.appendChild(buildCard(sec,row,idx,true)));
        details.appendChild(stoppedList);
        container.appendChild(details);
    }
}

function renderAll() {
    renderSection('A','sectionA');
    renderSection('B','sectionB');
    renderAlertPanel();
}

// change 이벤트 위임 (이름, 헤더, 별점)
document.addEventListener('change', function(e) {
    let el=e.target; if(!el.dataset.sec) return;
    let sec=el.dataset.sec, field=el.dataset.field, idx=el.dataset.idx, lt=el.dataset.type;
    let arr=lt==='stopped'?state[sec].stoppedRows:state[sec].rows;
    if (field==='title') state[sec].title=el.value;
    else if (el.dataset.hidx!==undefined) { state.A.headers[el.dataset.hidx]=el.value; state.B.headers[el.dataset.hidx]=el.value; }
    else if (field==='name') arr[idx].name=el.value;
    else if (el.dataset.sidx!==undefined) arr[idx].scores[el.dataset.sidx]=parseInt(el.value);
    saveData(); renderAlertPanel();
});

// ────────────────────────────────────────────────
// 구글 드라이브
// ────────────────────────────────────────────────
const DRIVE_FILE_NAME="수강생평가데이터.json";
const DRIVE_SCOPE="https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/drive.file";
let driveAccessToken=null, driveFileId=null;
function getClientId(){ return document.querySelector('meta[name="google-client-id"]').content; }
function driveLogin(){
    const client=google.accounts.oauth2.initTokenClient({
        client_id:getClientId(), scope:DRIVE_SCOPE,
        callback:(resp)=>{
            if(resp.error){setDriveStatus("err","로그인 실패: "+resp.error);return;}
            driveAccessToken=resp.access_token;
            setDriveStatus("ok","구글 연결됨");
            document.getElementById("btnDriveLogin").style.display="none";
            ["btnDriveSave","btnDriveLoad","btnDriveLogout"].forEach(id=>document.getElementById(id).style.display="");
        }
    });
    client.requestAccessToken();
}
function driveLogout(){
    driveAccessToken=null; driveFileId=null;
    document.getElementById("btnDriveLogin").style.display="";
    ["btnDriveSave","btnDriveLoad","btnDriveLogout"].forEach(id=>document.getElementById(id).style.display="none");
    setDriveStatus("","드라이브 미연결");
}
function setDriveStatus(cls,msg){
    let el=document.getElementById("driveStatus");
    el.className="drive-status"+(cls?" "+cls:"");
    el.textContent=msg;
}
async function driveFindFile(){
    let r=await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${DRIVE_FILE_NAME}'&fields=files(id)`,{headers:{Authorization:"Bearer "+driveAccessToken}});
    let d=await r.json();
    return (d.files&&d.files.length>0)?d.files[0].id:null;
}
async function driveSave(){
    if(!driveAccessToken){alert("먼저 구글 로그인을 해주세요.");return;}
    setDriveStatus("ok","저장 중...");
    try{
        const json=JSON.stringify(state);
        if(!driveFileId) driveFileId=await driveFindFile();
        if(driveFileId){
            await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,{method:"PATCH",headers:{Authorization:"Bearer "+driveAccessToken,"Content-Type":"application/json"},body:json});
        } else {
            let form=new FormData();
            form.append("metadata",new Blob([JSON.stringify({name:DRIVE_FILE_NAME,parents:["appDataFolder"]})],{type:"application/json"}));
            form.append("file",new Blob([json],{type:"application/json"}));
            let r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",{method:"POST",headers:{Authorization:"Bearer "+driveAccessToken},body:form});
            driveFileId=(await r.json()).id;
        }
        setDriveStatus("ok","저장 완료 ("+new Date().toLocaleTimeString()+")");
    }catch(e){setDriveStatus("err","저장 실패: "+e.message);}
}
async function driveLoad(){
    if(!driveAccessToken){alert("먼저 구글 로그인을 해주세요.");return;}
    setDriveStatus("ok","불러오는 중...");
    try{
        if(!driveFileId) driveFileId=await driveFindFile();
        if(!driveFileId){setDriveStatus("err","저장된 파일이 없습니다.");return;}
        let p=await(await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,{headers:{Authorization:"Bearer "+driveAccessToken}})).json();
        if(!p.A.stoppedRows) p.A.stoppedRows=[];
        if(!p.B.stoppedRows) p.B.stoppedRows=[];
        state=p; syncHeadersOnLoad(); saveData(); renderAll();
        setDriveStatus("ok","불러오기 완료 ("+new Date().toLocaleTimeString()+")");
    }catch(e){setDriveStatus("err","불러오기 실패: "+e.message);}
}

window.onload = loadData;
